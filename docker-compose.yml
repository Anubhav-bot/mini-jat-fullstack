services:
  db:
    image: postgres:16-alpine
    container_name: jat-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jat_user
      POSTGRES_PASSWORD: jat_password
      POSTGRES_DB: jat_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jat_user -d jat_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./mini-jat-backend
    container_name: jat-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://jat_user:jat_password@db:5432/jat_db
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./mini-jat-frontend
    container_name: jat-frontend
    restart: unless-stopped
    ports:
      - "5173:4173"
    depends_on:
      - backend

volumes:
  pgdata:
